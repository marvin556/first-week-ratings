<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First week ratings - ARO Multiservices</title>
<style>
  :root { --accent:#FF355E; --accent-dark:#e02950; --ink:#1c1b29; --grey:#6f6e77; --line:#e9e8ee; --bg:#f7f6f9; --ok:#1e9e63; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .topbar { width:100%; background:#fff; border-bottom:1px solid var(--line); padding:14px 24px; display:flex; align-items:center; gap:10px; }
  .wrap { width:100%; max-width:520px; padding:30px 20px 60px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px; box-shadow:0 6px 24px rgba(28,27,41,.06); }
  .chip { display:inline-block; background:#ffe9ee; color:var(--accent-dark); font-size:12px; font-weight:700; padding:5px 12px; border-radius:999px; margin-bottom:14px; }
  h1 { font-size:20px; line-height:1.3; margin-bottom:6px; }
  .sub { color:var(--grey); font-size:14px; margin-bottom:20px; }
  .tabs { display:flex; gap:6px; margin-bottom:22px; flex-wrap:wrap; }
  .tab { flex:1; min-width:84px; border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 6px; font-size:13px; font-weight:600; cursor:pointer; text-align:center; color:var(--ink); }
  .tab.active { border-color:var(--accent); background:#fff7f9; }
  .tab .st { display:block; font-size:11px; font-weight:400; color:var(--grey); margin-top:2px; }
  .tab.done .st { color:var(--ok); }
  .tab.noinfo .st { color:#b3831d; }
  .label { font-size:14px; font-weight:600; margin-bottom:10px; }
  .datefield { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .datefield input { border:1px solid var(--line); border-radius:10px; padding:9px 12px; font:inherit; font-size:14px; color:var(--ink); }
  .datefield input:focus { outline:none; border-color:var(--accent); }
  .stars { display:flex; gap:8px; margin-bottom:6px; }
  .star { width:50px; height:50px; border:1px solid var(--line); border-radius:12px; background:#fff; cursor:pointer; font-size:25px; color:#d4d3db; transition:all .12s ease; display:flex; align-items:center; justify-content:center; }
  .star:hover { border-color:var(--accent); transform:translateY(-2px); }
  .star.on { color:#ffb400; border-color:var(--accent); background:#fff7f9; }
  .star.ro { cursor:default; }
  .star.ro:hover { transform:none; border-color:var(--line); }
  .star.ro.on { border-color:var(--line); background:#fff; }
  .star-caption { font-size:13px; color:var(--grey); height:18px; margin-bottom:18px; }
  textarea { width:100%; border:1px solid var(--line); border-radius:12px; padding:12px 14px; font:inherit; font-size:14px; resize:vertical; min-height:74px; margin-bottom:18px; color:var(--ink); }
  textarea:focus { outline:none; border-color:var(--accent); }
  .readrow { font-size:14px; color:var(--ink); margin-bottom:14px; }
  .readrow .k { color:var(--grey); font-size:12px; text-transform:uppercase; letter-spacing:.3px; display:block; margin-bottom:3px; }
  .btn { width:100%; background:var(--accent); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; }
  .btn:hover { background:var(--accent-dark); }
  .btn:disabled { background:#f0aebd; cursor:not-allowed; }
  .btn-ghost { width:100%; background:#fff; color:var(--grey); border:1px dashed var(--line); border-radius:12px; padding:11px; font-size:13px; font-weight:600; cursor:pointer; margin-top:10px; }
  .btn-ghost:hover { border-color:var(--grey); color:var(--ink); }
  .btn-sec { width:100%; background:#fff; color:var(--accent); border:1px solid var(--accent); border-radius:12px; padding:11px; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; }
  .statusline { display:inline-block; font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px; margin-bottom:14px; }
  .statusline.done { background:#e8f6ef; color:var(--ok); }
  .statusline.noinfo { background:#faf3e0; color:#b3831d; }
  .privacy { margin-top:16px; font-size:12px; color:var(--grey); background:var(--bg); border-radius:10px; padding:10px 14px; line-height:1.5; }
  .foot { text-align:center; font-size:12px; color:var(--grey); margin-top:18px; }
  .error { color:#c0392b; font-size:13px; margin-bottom:12px; display:none; }
  .factorial-link { display:block; text-align:center; margin-top:18px; font-size:13px; color:var(--accent); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
  <div class="topbar"><img src="/logo.png" alt="ARO Multiservices" style="height:34px" onerror="this.outerHTML='<span style=&quot;font-family:Georgia,serif;font-weight:700;letter-spacing:2px;color:#1B2653&quot;>ARO <small style=&quot;letter-spacing:4px;font-weight:400&quot;>MULTISERVICES</small></span>'"></div>
  <div class="wrap">
    <div class="card">
      <span class="chip" id="chip"></span>
      <h1 id="heading"></h1>
      <p class="sub" id="sub"></p>
      <div class="tabs" id="tabs"></div>
      <div id="panel"></div>
      <div class="privacy" id="privacy"></div>
      <a class="factorial-link" href="https://app.factorialhr.com/inbox/todo">Return to Factorial &rarr;</a>
    </div>
    <div class="foot">ARO Multiservices &middot; delivered by Faqtic</div>
  </div>
<script>
const DATA = {{DATA}};
const captions = {1:"Poor",2:"Below expectations",3:"Okay",4:"Good",5:"Excellent"};
let current = DATA.days.findIndex(d => d.status === 'open');
if (current < 0) current = 0;
const edit = {};   // per-day boolean: is this day being edited?
const draft = {};  // per-day working copy {rating, comment, date}

document.getElementById('chip').textContent = DATA.chip;
document.getElementById('heading').textContent = DATA.texts.heading;
document.getElementById('sub').textContent = DATA.texts.sub;
document.getElementById('privacy').textContent = DATA.texts.privacy;

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  DATA.days.forEach((day, i) => {
    const b = document.createElement('button');
    b.className = 'tab' + (i === current ? ' active' : '') + (day.status === 'done' ? ' done' : day.status === 'noinfo' ? ' noinfo' : '');
    b.innerHTML = `Day ${day.d}<span class="st">${day.status === 'done' ? 'Saved' : day.status === 'noinfo' ? 'No info' : day.dateShort}</span>`;
    b.onclick = () => { current = i; render(); };
    el.appendChild(b);
  });
}

function stars(rating, readonly) {
  return `<div class="stars">${[1,2,3,4,5].map(v =>
    `<button class="star${readonly ? ' ro' : ''}${v <= rating ? ' on' : ''}" data-v="${v}">&#9733;</button>`).join('')}</div>`;
}

function editForm(day) {
  const d = draft[day.d] = draft[day.d] || { rating: day.rating || 0, comment: day.comment || '', date: day.date };
  return `
    <div class="label">Date</div>
    <div class="datefield"><input type="date" id="date" value="${d.date}"></div>
    <div class="label">Rating</div>
    ${stars(d.rating, false)}
    <div class="star-caption">${d.rating ? captions[d.rating] : '&nbsp;'}</div>
    <div class="label">Comment <span style="color:var(--grey);font-weight:400">(optional)</span></div>
    <textarea id="comment" placeholder="Anything worth noting?">${d.comment || ''}</textarea>
    <div class="error" id="error">Something went wrong. Please try again.</div>
    <button class="btn" id="saveBtn" ${d.rating ? '' : 'disabled'}>Save day ${day.d}</button>
    <button class="btn-ghost" id="noInfoBtn">No information received for day ${day.d}</button>
    ${day.status !== 'open' ? `<button class="btn-ghost" id="cancelBtn">Cancel</button>` : ''}`;
}

function savedView(day) {
  const statusLabel = day.status === 'noinfo'
    ? '<span class="statusline noinfo">No information received</span>'
    : '<span class="statusline done">Saved &middot; task marked done</span>';
  const rating = day.status === 'done'
    ? `<div class="readrow"><span class="k">Rating</span>${stars(day.rating, true)}<div class="star-caption">${day.rating ? captions[day.rating] : ''}</div></div>`
    : '';
  const comment = (day.status === 'done' && day.comment)
    ? `<div class="readrow"><span class="k">Comment</span>${escapeHtml(day.comment)}</div>` : '';
  return `
    ${statusLabel}
    <div class="readrow"><span class="k">Date</span>${day.dateLong}</div>
    ${rating}${comment}
    <button class="btn-sec" id="editBtn">Edit day ${day.d}</button>`;
}

function escapeHtml(s) { const p = document.createElement('p'); p.textContent = s; return p.innerHTML; }

function renderPanel() {
  const day = DATA.days[current];
  const p = document.getElementById('panel');
  const editable = day.status === 'open' || edit[day.d];

  if (!editable) { p.innerHTML = savedView(day); wireSaved(day, p); return; }
  p.innerHTML = editForm(day);
  wireEdit(day, p);
}

function wireSaved(day, p) {
  p.querySelector('#editBtn').onclick = () => {
    edit[day.d] = true;
    draft[day.d] = { rating: day.rating || 0, comment: day.comment || '', date: day.date };
    renderPanel();
  };
}

function wireEdit(day, p) {
  const d = draft[day.d];
  const isEdit = day.status !== 'open';  // editing an already-saved day
  p.querySelectorAll('.star').forEach(s => s.onclick = () => { d.rating = +s.dataset.v; renderPanel(); });
  p.querySelector('#date').onchange = (e) => { d.date = e.target.value; };
  p.querySelector('#comment').oninput = (e) => { d.comment = e.target.value; };
  p.querySelector('#saveBtn').onclick = () =>
    send(isEdit ? '/api/update' : '/api/submit', { rating: d.rating, comment: d.comment, date: d.date }, day, 'done');
  p.querySelector('#noInfoBtn').onclick = () => {
    if (confirm(`Record day ${day.d} as "no information received"? This marks the task as done.`))
      send(isEdit ? '/api/update' : '/api/no-info', { noInfo: true, date: d.date }, day, 'noinfo');
  };
  const cancel = p.querySelector('#cancelBtn');
  if (cancel) cancel.onclick = () => { edit[day.d] = false; renderPanel(); };
}

async function send(endpoint, body, day, newStatus) {
  const btns = document.querySelectorAll('#panel button'); btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch(endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ token: DATA.token, day: day.d }, body)),
    });
    if (!res.ok) throw new Error('failed');
    const out = await res.json();
    day.status = newStatus;
    day.rating = body.noInfo ? 0 : (body.rating || 0);
    day.comment = body.noInfo ? '' : (body.comment || '');
    if (out.date) { day.date = out.date; day.dateShort = shortDate(out.date); day.dateLong = longDate(out.date); }
    const wasEditing = edit[day.d];
    edit[day.d] = false;
    // After completing a fresh day, jump to the next open one; when editing, stay put.
    if (!wasEditing) {
      const next = DATA.days.findIndex(x => x.status === 'open');
      if (next >= 0) current = next;
    }
    render();
  } catch (e) {
    const err = document.getElementById('error');
    if (err) err.style.display = 'block';
    btns.forEach(b => b.disabled = false);
  }
}

function shortDate(iso) { return new Date(iso+'T00:00:00Z').toLocaleDateString('en-GB',{day:'numeric',month:'short',timeZone:'UTC'}); }
function longDate(iso) { return new Date(iso+'T00:00:00Z').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',timeZone:'UTC'}); }

function render() { renderTabs(); renderPanel(); }
render();
</script>
</body>
</html>
